version: '3.8'
services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app/backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DB=mguide
      - MONGODB_CONSULTATIONS_COLLECTION=consultations
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_API_URL=${LLM_API_URL:-https://api.groq.com/openai/v1}
      - MODEL_NAME=${MODEL_NAME:-llama3-8b-8192}
      # Also expose as standard OpenAI env vars so the openai package picks them up
      - OPENAI_API_KEY=${LLM_API_KEY}
      - OPENAI_BASE_URL=${LLM_API_URL:-https://api.groq.com/openai/v1}
      - MEM0_LLM_MODEL=${MEM0_LLM_MODEL:-}
      - MEM0_EMBED_API_URL=${MEM0_EMBED_API_URL:-https://api.openai.com/v1}
      - MEM0_EMBED_API_KEY=${MEM0_EMBED_API_KEY:-}
      - MEM0_EMBED_MODEL=${MEM0_EMBED_MODEL:-text-embedding-3-small}
      - CHROMA_SERVER_HOST=chroma
      - CHROMA_SERVER_HTTP_PORT=8000
    depends_on:
      - mongo
      - chroma

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

  chroma:
    image: ghcr.io/chroma-core/chroma:latest
    restart: unless-stopped
    environment:
      - IS_PERSISTENT=TRUE
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8000"
    networks:
      - default

volumes:
  mongo_data:
    driver: local
  chroma_data:
    driver: local
