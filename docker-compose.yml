version: '3.8'
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app/backend
    ports:
      - "8000:8000"
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_API_URL=${LLM_API_URL:-https://api.groq.com/openai/v1}
      - MODEL_NAME=${MODEL_NAME:-llama-3.1-8b-instant}
      # Also expose as standard OpenAI env vars so the openai package picks them up
      - OPENAI_API_KEY=${LLM_API_KEY}
      - OPENAI_BASE_URL=${LLM_API_URL:-https://api.groq.com/openai/v1}
      - MEM0_LLM_MODEL=${MEM0_LLM_MODEL:-}
      - MEM0_EMBED_API_URL=${MEM0_EMBED_API_URL:-https://api.openai.com/v1}
      - MEM0_EMBED_API_KEY=${MEM0_EMBED_API_KEY:-}
      - MEM0_EMBED_MODEL=${MEM0_EMBED_MODEL:-text-embedding-3-small}
      - CHROMA_SERVER_HOST=chroma
      - CHROMA_SERVER_HTTP_PORT=8000
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=mediguide
      - MYSQL_PASSWORD=password
      - MYSQL_DATABASE=mediguideai
    depends_on:
      chroma:
        condition: service_started
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - MYSQL_DATABASE=mediguideai
      - MYSQL_USER=mediguide
      - MYSQL_PASSWORD=password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-umediguide", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

  chroma:
    image: ghcr.io/chroma-core/chroma:latest
    restart: unless-stopped
    environment:
      - IS_PERSISTENT=TRUE
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8000"
    networks:
      - default

volumes:
  chroma_data:
    driver: local
  mysql_data:
    driver: local
